version: '3.9'

# ── CloudPix: scalable multi-instance deployment with NGINX load balancer ───
#
# Architecture:
#   NGINX (port 80) → [app1:3000, app2:3000] → MongoDB Atlas
#
# Demonstrates:
#   • Horizontal scaling via multiple app replicas
#   • Dynamic DNS routing via NGINX upstream
#   • Shared upload volume across instances

services:

  # ── App Instance 1 ──────────────────────────────────────────────────────
  app1:
    build: .
    container_name: cloudpix_app1
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_SECRET=${ADMIN_SECRET}
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - cloudpix_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── App Instance 2 ──────────────────────────────────────────────────────
  app2:
    build: .
    container_name: cloudpix_app2
    environment:
      - PORT=3000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_SECRET=${ADMIN_SECRET}
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    networks:
      - cloudpix_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NGINX Load Balancer / Reverse Proxy ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cloudpix_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
    restart: unless-stopped
    networks:
      - cloudpix_net

# ── Shared volume for uploaded images ──────────────────────────────────────
volumes:
  uploads_data:

networks:
  cloudpix_net:
    driver: bridge
