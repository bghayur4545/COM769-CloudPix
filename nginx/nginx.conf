# ── CloudPix NGINX Configuration ───────────────────────────────────────────
# Implements: Dynamic DNS routing / reverse proxy / load balancing
# Pattern:    Round-robin across app instances (horizontal scaling)

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream="$upstream_addr"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain text/css application/json application/javascript;

    # ── Upstream: CloudPix app instances (round-robin load balancing) ────────
    upstream cloudpix_backend {
        # Round-robin is the default — requests distributed evenly
        server app1:3000 weight=1;
        server app2:3000 weight=1;

        # Mark instance as down after 3 failures within 30s
        # NGINX will route around the failed instance automatically (dynamic routing)
        keepalive 32;
    }

    # ── Rate limit zone (extra layer above app-level limiting) ──────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── Server ──────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        client_max_body_size 15M;

        # Security headers
        add_header X-Frame-Options        SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection       "1; mode=block";
        add_header Referrer-Policy        strict-origin-when-cross-origin;

        # ── API — proxied to Node.js cluster ────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://cloudpix_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        keep-alive;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Uploaded images — proxied and cached at NGINX level ─────────────
        location /uploads/ {
            proxy_pass       http://cloudpix_backend;
            proxy_set_header Host $host;

            # Cache images at NGINX for 1 day (reduces load on app instances)
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ── Static frontend — proxied to app ────────────────────────────────
        location / {
            proxy_pass         http://cloudpix_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check (used by Docker + cloud load balancers) ────────────
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
